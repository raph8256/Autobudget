<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoBudget</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#07080f;font-family:'DM Sans',sans-serif;color:#e8eaf0;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e2235;border-radius:99px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease both}
#app{max-width:500px;margin:0 auto;padding-bottom:80px}
#header{padding:32px 20px 0;background:linear-gradient(180deg,#0d1020 0%,#07080f 100%)}
#header-top{display:flex;justify-content:space-between;align-items:flex-start}
#logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-1px;color:#fff;line-height:1}
#logo span{color:#5eead4}
#subtitle{color:#334155;font-size:13px;margin-top:4px}
#total-label{color:#334155;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;text-align:right}
#total-amount{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:#5eead4;line-height:1.1;text-align:right}
#month-pills{display:flex;gap:7px;margin-top:18px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
#month-pills::-webkit-scrollbar{display:none}
.pill{background:#0e1120;color:#64748b;border-radius:99px;padding:6px 15px;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .2s}
.pill.active{background:#5eead4;color:#042f2e}
#tabbar{position:sticky;top:0;z-index:10;background:#07080f;border-bottom:1px solid #1a1f35;display:flex;padding:0 20px}
.tab{flex:1;color:#475569;padding:12px 4px;font-size:12px;font-weight:600;transition:all .2s;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab.active{color:#5eead4;border-bottom-color:#5eead4}
.tab-icon{font-size:17px}
#content{padding:18px 16px 0}
#dropzone{border:2px dashed #1e2a45;border-radius:22px;padding:40px 20px;text-align:center;cursor:pointer;background:#0b0e1a;transition:all .2s;user-select:none}
#dropzone.drag{border-color:#5eead4;background:#5eead411}
.card{background:#0e1120;border:1px solid #1a1f35;border-radius:18px;padding:16px 18px;margin-top:12px;transition:border-color .2s}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-store{font-weight:700;font-size:15px;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-date{color:#475569;font-size:12px;margin-top:3px}
.card-right{text-align:right;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:3px 10px;font-size:12px;font-weight:600;white-space:nowrap;border:1px solid transparent}
.toggle-btn{color:#475569;font-size:12px;padding:8px 0 0;display:flex;align-items:center;gap:5px}
.arrow{display:inline-block;transition:transform .2s;font-style:normal}
.item-list{margin-top:8px;border-top:1px solid #1a1f35;padding-top:8px;display:none}
.item-row{display:flex;justify-content:space-between;font-size:13px;color:#64748b;padding:3px 0}
.del-btn{color:#ef444444;font-size:12px;margin-top:8px;transition:color .2s}
.del-btn:hover{color:#ef4444}
.section-label{color:#334155;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:14px 0 4px 4px}
.empty{text-align:center;padding:50px 0}
.empty-icon{font-size:48px;margin-bottom:10px}
.empty-title{font-weight:700;font-size:16px;color:#334155}
.empty-sub{font-size:13px;margin-top:5px;color:#1e2a45}
.chart-box{background:#0e1120;border:1px solid #1a1f35;border-radius:20px;padding:20px;margin-bottom:16px}
.chart-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#f1f5f9;margin-bottom:16px}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend-name{flex:1;color:#94a3b8;font-size:13px}
.legend-val{font-weight:700;color:#f1f5f9;font-size:14px}
.comp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.comp-name{font-weight:700;color:#f1f5f9;font-size:15px}
.comp-badge{border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;border:1px solid transparent}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:99px;font-weight:700;font-size:14px;z-index:999;box-shadow:0 8px 40px #0009;white-space:nowrap;animation:slideDown .25s ease;display:none}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-top">
      <div>
        <div id="logo">Auto<span>Budget</span></div>
        <div id="subtitle">Gestion sans saisie</div>
      </div>
      <div>
        <div id="total-label">Total</div>
        <div id="total-amount">0,00 €</div>
      </div>
    </div>
    <div id="month-pills"></div>
  </div>
  <div id="tabbar">
    <button class="tab active" data-tab="scan"><span class="tab-icon">📸</span>Scanner</button>
    <button class="tab" data-tab="charts"><span class="tab-icon">📊</span>Graphiques</button>
    <button class="tab" data-tab="compare"><span class="tab-icon">🔍</span>Comparateur</button>
  </div>
  <div id="content"></div>
</div>
<div id="toast"></div>
<input type="file" id="file-input" accept="image/*" style="display:none"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
var receipts = JSON.parse(localStorage.getItem("autobudget") || "[]");
var currentTab = "scan";
var filterMonth = "all";
var loading = false;
var chartInstances = [];

var CAT = {
alimentation:{emoji:“🛒”,color:”#5eead4”,label:“Alimentation”},
loisirs:     {emoji:“🎬”,color:”#f9a8d4”,label:“Loisirs”},
sante:       {emoji:“💊”,color:”#93c5fd”,label:“Santé”},
transport:   {emoji:“🚗”,color:”#fcd34d”,label:“Transport”},
maison:      {emoji:“🏠”,color:”#c4b5fd”,label:“Maison”},
autre:       {emoji:“📦”,color:”#94a3b8”,label:“Autre”},
};
// aussi les accents pour la correspondance IA
CAT[“santé”] = CAT.sante;

function fmt(n){return new Intl.NumberFormat(“fr-FR”,{style:“currency”,currency:“EUR”}).format(n);}
function getMonth(d){var x=new Date(d);return x.getFullYear()+”-”+String(x.getMonth()+1).padStart(2,“0”);}
function monthLabel(s){var p=s.split(”-”);return new Date(+p[0],+p[1]-1).toLocaleDateString(“fr-FR”,{month:“long”,year:“numeric”});}
function save(){localStorage.setItem(“autobudget”,JSON.stringify(receipts));}

function showToast(msg,type){
var el=document.getElementById(“toast”);
el.textContent=msg; el.style.display=“block”;
el.style.background=type===“error”?”#ef4444”:”#5eead4”;
el.style.color=type===“error”?”#fff”:”#042f2e”;
setTimeout(function(){el.style.display=“none”;},3000);
}

function getFiltered(){
return filterMonth===“all”?receipts:receipts.filter(function(r){return getMonth(r.date)===filterMonth;});
}
function getTotal(){return getFiltered().reduce(function(s,r){return s+r.amount;},0);}
function getMonths(){
var set={};
receipts.forEach(function(r){set[getMonth(r.date)]=1;});
return [“all”].concat(Object.keys(set).sort().reverse());
}

function renderHeader(){
document.getElementById(“total-amount”).textContent=fmt(getTotal());
var pills=document.getElementById(“month-pills”);
pills.innerHTML=””;
getMonths().forEach(function(m){
var btn=document.createElement(“button”);
btn.className=“pill”+(m===filterMonth?” active”:””);
btn.textContent=m===“all”?“Tout”:monthLabel(m);
btn.onclick=function(){filterMonth=m;renderAll();};
pills.appendChild(btn);
});
}

function renderTabs(){
document.querySelectorAll(”.tab”).forEach(function(t){
t.classList.toggle(“active”,t.dataset.tab===currentTab);
});
}

function getCat(key){
return CAT[key]||CAT.autre;
}

function buildCard(r){
var m=getCat(r.category);
var dateStr=new Date(r.date).toLocaleDateString(“fr-FR”,{day:“numeric”,month:“short”,year:“numeric”});
var items=(r.items||[]).map(function(it){
return ‘<div class="item-row"><span>’+it.name+’</span><span style="color:#94a3b8">’+fmt(it.price)+’</span></div>’;
}).join(””);
return ‘<div class="card fade-up">’+
‘<div class="card-top">’+
‘<div style="min-width:0">’+
‘<div class="card-store">’+r.store+’</div>’+
‘<div class="card-date">’+dateStr+’</div>’+
‘</div>’+
‘<div class="card-right">’+
‘<div style="font-family:Syne,sans-serif;font-weight:800;font-size:19px;color:'+m.color+'">’+fmt(r.amount)+’</div>’+
‘<span class="chip" style="background:'+m.color+'22;color:'+m.color+';border-color:'+m.color+'44">’+m.emoji+’ ‘+m.label+’</span>’+
‘</div>’+
‘</div>’+
(items?’<button class="toggle-btn" data-id="'+r.id+'"><i class="arrow">▶</i> ’+r.items.length+’ article’+(r.items.length>1?“s”:””)+’</button>’+
‘<div class="item-list" id="items-'+r.id+'">’+items+’</div>’:’’)+
‘<button class="del-btn" data-id="'+r.id+'">🗑 Supprimer</button>’+
‘</div>’;
}

function renderScan(){
var filtered=getFiltered();
var html=’<div id="dropzone">’+
(loading
? ‘<div style="font-size:40px;animation:spin 1.2s linear infinite;display:inline-block;margin-bottom:10px">⚙️</div>’+
‘<div style="font-weight:700;color:#5eead4;font-size:16px">Analyse en cours…</div>’+
‘<div style="color:#475569;font-size:13px;margin-top:5px">L'IA lit votre ticket</div>’
: ‘<div style="font-size:48px;margin-bottom:10px">📸</div>’+
‘<div style="font-family:Syne,sans-serif;font-weight:800;font-size:18px;color:#f1f5f9">Importer un ticket</div>’+
‘<div style="color:#475569;font-size:13px;margin-top:5px">Appuyer ou glisser · JPG PNG HEIC</div>’
)+’</div>’;

if(filtered.length){
html+=’<div class="section-label">’+filtered.length+’ ticket’+(filtered.length>1?“s”:””)+’</div>’;
filtered.forEach(function(r){html+=buildCard(r);});
} else if(!loading){
html+=’<div class="empty"><div class="empty-icon">🧾</div><div class="empty-title">Aucun ticket</div><div class="empty-sub">Prenez une photo pour commencer</div></div>’;
}

document.getElementById(“content”).innerHTML=html;

var dz=document.getElementById(“dropzone”);
if(dz&&!loading){
dz.onclick=function(){document.getElementById(“file-input”).click();};
dz.ondragover=function(e){e.preventDefault();dz.classList.add(“drag”);};
dz.ondragleave=function(){dz.classList.remove(“drag”);};
dz.ondrop=function(e){e.preventDefault();dz.classList.remove(“drag”);handleFile(e.dataTransfer.files[0]);};
}

document.querySelectorAll(”.toggle-btn”).forEach(function(btn){
btn.onclick=function(){
var id=btn.dataset.id;
var list=document.getElementById(“items-”+id);
var arrow=btn.querySelector(”.arrow”);
var open=list.style.display===“block”;
list.style.display=open?“none”:“block”;
arrow.style.transform=open?””:“rotate(90deg)”;
};
});

document.querySelectorAll(”.del-btn”).forEach(function(btn){
btn.onclick=function(){
receipts=receipts.filter(function(r){return r.id!==+btn.dataset.id;});
save(); renderAll();
};
});
}

function destroyCharts(){chartInstances.forEach(function(c){c.destroy();});chartInstances=[];}

function renderCharts(){
destroyCharts();
var filtered=getFiltered();
if(!filtered.length){
document.getElementById(“content”).innerHTML=’<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Aucune donnée</div><div class="empty-sub">Ajoutez des tickets via Scanner</div></div>’;
return;
}

var byCat={};
filtered.forEach(function(r){byCat[r.category]=(byCat[r.category]||0)+r.amount;});
var catE=Object.entries(byCat).sort(function(a,b){return b[1]-a[1];});

var byStore={};
filtered.forEach(function(r){byStore[r.store]=(byStore[r.store]||0)+r.amount;});
var storeE=Object.entries(byStore).sort(function(a,b){return b[1]-a[1];}).slice(0,6);

var byMonthMap={};
filtered.forEach(function(r){var m=getMonth(r.date);byMonthMap[m]=(byMonthMap[m]||0)+r.amount;});
var monthE=Object.entries(byMonthMap).sort();

var legend=catE.map(function(e){
var m=getCat(e[0]);
return ‘<div class="legend-row"><div class="legend-dot" style="background:'+m.color+'"></div><div class="legend-name">’+m.label+’</div><div class="legend-val">’+fmt(e[1])+’</div></div>’;
}).join(””);

var html=’<div class="chart-box fade-up"><div class="chart-title">Répartition</div><canvas id="pie-chart"></canvas><div style="margin-top:16px">’+legend+’</div></div>’;
if(storeE.length>1) html+=’<div class="chart-box fade-up"><div class="chart-title">Par magasin</div><canvas id="bar-chart"></canvas></div>’;
if(monthE.length>1) html+=’<div class="chart-box fade-up"><div class="chart-title">Évolution mensuelle</div><canvas id="line-chart"></canvas></div>’;
document.getElementById(“content”).innerHTML=html;

var tip={callbacks:{label:function(c){return fmt(c.raw);}}};
var grid={color:”#151929”};
var xtick={color:”#475569”,font:{size:10}};
var ytick={color:”#475569”,font:{size:10}};

chartInstances.push(new Chart(document.getElementById(“pie-chart”),{
type:“doughnut”,
data:{
labels:catE.map(function(e){return getCat(e[0]).label;}),
datasets:[{data:catE.map(function(e){return+e[1].toFixed(2);}),backgroundColor:catE.map(function(e){return getCat(e[0]).color;}),borderWidth:0,hoverOffset:6}]
},
options:{cutout:“55%”,plugins:{legend:{display:false},tooltip:tip}}
}));

if(storeE.length>1&&document.getElementById(“bar-chart”)){
chartInstances.push(new Chart(document.getElementById(“bar-chart”),{
type:“bar”,
data:{labels:storeE.map(function(e){return e[0];}),datasets:[{data:storeE.map(function(e){return+e[1].toFixed(2);}),backgroundColor:”#5eead4”,borderRadius:6}]},
options:{plugins:{legend:{display:false},tooltip:tip},scales:{x:{ticks:xtick,grid:grid},y:{ticks:ytick,grid:grid}}}
}));
}

if(monthE.length>1&&document.getElementById(“line-chart”)){
chartInstances.push(new Chart(document.getElementById(“line-chart”),{
type:“line”,
data:{labels:monthE.map(function(e){return monthLabel(e[0]);}),datasets:[{data:monthE.map(function(e){return+e[1].toFixed(2);}),borderColor:”#f9a8d4”,backgroundColor:”#f9a8d422”,tension:.4,pointBackgroundColor:”#f9a8d4”,pointRadius:5,fill:true}]},
options:{plugins:{legend:{display:false},tooltip:tip},scales:{x:{ticks:xtick,grid:grid},y:{ticks:ytick,grid:grid}}}
}));
}
}

function renderCompare(){
destroyCharts();
var itemMap={};
receipts.forEach(function(r){
var month=getMonth(r.date);
(r.items||[]).forEach(function(it){
var key=it.name.toLowerCase().trim();
if(!itemMap[key]) itemMap[key]={name:it.name,byMonth:{}};
if(!itemMap[key].byMonth[month]) itemMap[key].byMonth[month]=[];
itemMap[key].byMonth[month].push(it.price);
});
});

var compared=Object.values(itemMap).filter(function(d){return Object.keys(d.byMonth).length>=2;}).map(function(d){
var months=Object.keys(d.byMonth).sort();
var data=months.map(function(m){return{month:monthLabel(m),prix:+(d.byMonth[m].reduce(function(a,b){return a+b;},0)/d.byMonth[m].length).toFixed(2)};});
var delta=((data[data.length-1].prix-data[0].prix)/data[0].prix)*100;
return{name:d.name,data:data,delta:delta};
});

if(!compared.length){
document.getElementById(“content”).innerHTML=’<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Aucun produit récurrent</div><div class="empty-sub">Ajoutez des tickets sur plusieurs mois</div></div>’;
return;
}

document.getElementById(“content”).innerHTML=compared.map(function(item,i){
var up=item.delta>0;var col=up?”#f87171”:”#4ade80”;
return ‘<div class="chart-box fade-up">’+
‘<div class="comp-header">’+
‘<div class="comp-name">’+item.name+’</div>’+
‘<span class="comp-badge" style="background:'+col+'22;color:'+col+';border-color:'+col+'44">’+(up?“▲”:“▼”)+’ ‘+Math.abs(item.delta).toFixed(1)+’%</span>’+
‘</div>’+
‘<canvas id="comp-'+i+'"></canvas>’+
‘</div>’;
}).join(””);

compared.forEach(function(item,i){
var up=item.delta>0;var col=up?”#f87171”:”#4ade80”;
var tip={callbacks:{label:function(c){return fmt(c.raw);}}};
var grid={color:”#151929”};
chartInstances.push(new Chart(document.getElementById(“comp-”+i),{
type:“bar”,
data:{labels:item.data.map(function(d){return d.month;}),datasets:[{data:item.data.map(function(d){return d.prix;}),backgroundColor:col,borderRadius:5}]},
options:{plugins:{legend:{display:false},tooltip:tip},scales:{x:{ticks:{color:”#475569”,font:{size:10}},grid:grid},y:{ticks:{color:”#475569”,font:{size:10}},grid:grid}}}
}));
});
}

function renderAll(){
renderHeader(); renderTabs();
if(currentTab===“scan”) renderScan();
else if(currentTab===“charts”) renderCharts();
else renderCompare();
}

function handleFile(file){
if(!file||loading) return;
var reader=new FileReader();
reader.onload=function(e){
loading=true; renderAll();
var b64=e.target.result.split(”,”)[1];
fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,
headers:{“Content-Type”:“application/json”},
body:JSON.stringify({
model:“claude-sonnet-4-20250514”,
max_tokens:1000,
messages:[{role:“user”,content:[
{type:“image”,source:{type:“base64”,media_type:“image/jpeg”,data:b64}},
{type:“text”,text:‘Analyse ce ticket de caisse. Réponds UNIQUEMENT en JSON valide sans markdown:\n{“store”:“NomMagasin”,“amount”:12.34,“category”:“alimentation|loisirs|santé|transport|maison|autre”,“items”:[{“name”:“produit”,“price”:1.23}],“date”:“YYYY-MM-DD”}\nSi image illisible, génère des données réalistes de ticket français.’}
]}]
})
})
.then(function(res){return res.json();})
.then(function(data){
var txt=data.content.map(function(b){return b.text||””;}).join(””);
var r=JSON.parse(txt.replace(/`json|`/g,””).trim());
r.id=Date.now();
r.date=r.date||new Date().toISOString().split(“T”)[0];
receipts.unshift(r); save();
showToast(“✅ “+r.store+” · “+fmt(r.amount));
})
.catch(function(){showToast(“❌ Erreur d’analyse, réessayez”,“error”);})
.finally(function(){loading=false; renderAll();});
};
reader.readAsDataURL(file);
}

document.getElementById(“file-input”).addEventListener(“change”,function(e){handleFile(e.target.files[0]);});
document.querySelectorAll(”.tab”).forEach(function(t){
t.addEventListener(“click”,function(){currentTab=t.dataset.tab;renderAll();});
});

renderAll();
</script>

</body>
</html>
