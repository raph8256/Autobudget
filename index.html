<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoBudget</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#07080f;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:#e8eaf0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
@keyframes spin{to{transform:rotate(360deg)}}

/* LAYOUT */
#wrap{max-width:480px;margin:0 auto;padding-bottom:60px}

/* HEADER */
.hdr{padding:28px 16px 16px;background:#0d1020}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.logo{font-weight:900;font-size:24px;color:#fff;line-height:1.1}
.logo span{color:#5eead4}
.logo small{display:block;color:#475569;font-size:12px;font-weight:400;margin-top:2px}
.tot-box{text-align:right}
.tot-lbl{color:#475569;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.tot-val{font-weight:900;font-size:22px;color:#5eead4;line-height:1.2}

/* PILLS */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.pills::-webkit-scrollbar{display:none}
.pill{background:#131825;color:#64748b;border:1px solid #1e2a3a;border-radius:99px;padding:5px 14px;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0}
.pill.on{background:#5eead4;color:#022c22;border-color:#5eead4}

/* TABS */
.tabbar{position:sticky;top:0;z-index:10;background:#07080f;display:flex;border-bottom:1px solid #131825}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;font-size:11px;font-weight:600;color:#475569;border-bottom:2px solid transparent}
.tab .ti{font-size:20px}
.tab.on{color:#5eead4;border-bottom-color:#5eead4}

/* CONTENT */
#ct{padding:14px 14px 0}

/* DROPZONE */
.dz{border:2px dashed #1e2a3a;border-radius:18px;padding:44px 20px;text-align:center;cursor:pointer;background:#0b0d17;margin-bottom:4px}
.dz:hover,.dz.drag{border-color:#5eead4;background:#0d1a18}
.dz .big{font-size:44px;display:block;margin-bottom:10px}
.dz h2{font-size:17px;color:#f1f5f9;font-weight:700;margin-bottom:6px}
.dz p{font-size:13px;color:#475569}
.dz .spin{font-size:40px;display:inline-block;animation:spin 1s linear infinite;margin-bottom:10px}

/* EMPTY */
.empty{text-align:center;padding:50px 0}
.empty .big{font-size:44px;display:block;margin-bottom:10px}
.empty h3{font-size:15px;color:#334155;font-weight:700}
.empty p{font-size:12px;color:#1e293b;margin-top:4px}

/* SECTION LABEL */
.slbl{font-size:11px;color:#334155;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px 2px}

/* CARD */
.card{background:#0e1120;border:1px solid #1a2035;border-radius:16px;padding:14px 16px;margin-bottom:10px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card-left{min-width:0}
.card-store{font-weight:700;font-size:15px;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-date{font-size:12px;color:#475569;margin-top:2px}
.card-right{text-align:right;flex-shrink:0}
.card-amt{font-weight:900;font-size:18px;margin-bottom:3px}
.chip{display:inline-flex;align-items:center;gap:3px;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:600;border:1px solid transparent}
.tog{display:flex;align-items:center;gap:4px;margin-top:9px;font-size:12px;color:#475569}
.tog .arr{display:inline-block;font-size:9px;transition:transform .2s}
.ilist{display:none;margin-top:8px;border-top:1px solid #131825;padding-top:8px}
.irow{display:flex;justify-content:space-between;font-size:12px;color:#64748b;padding:2px 0}
.delbtn{display:block;margin-top:9px;font-size:12px;color:#ef444450;text-align:left}
.delbtn:hover{color:#ef4444}

/* CHART BOX */
.cbox{background:#0e1120;border:1px solid #1a2035;border-radius:16px;padding:18px;margin-bottom:12px}
.cbox h3{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:14px}

/* LEGEND */
.lgrow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.lgdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lgnm{flex:1;font-size:12px;color:#94a3b8}
.lgvl{font-size:13px;font-weight:700;color:#f1f5f9}

/* BAR CHART */
.bars{display:flex;flex-direction:column;gap:7px}
.brow{display:flex;align-items:center;gap:8px}
.blbl{width:72px;font-size:11px;color:#64748b;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.btrack{flex:1;height:18px;background:#131825;border-radius:99px;overflow:hidden}
.bfill{height:100%;border-radius:99px;transition:width .5s}
.bval{width:50px;font-size:11px;font-weight:600;color:#f1f5f9;text-align:right;flex-shrink:0}

/* MONTH CHART */
.mchart{display:flex;gap:6px;align-items:flex-end;height:80px;margin-top:4px}
.mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.mbar{width:100%;border-radius:5px 5px 0 0;min-height:4px;transition:height .4s}
.mval{font-size:9px;font-weight:600;text-align:center;white-space:nowrap}
.mlbl{font-size:9px;color:#475569;text-align:center}

/* COMP BADGE */
.cbdg{border-radius:99px;padding:2px 10px;font-size:12px;font-weight:700;border:1px solid transparent}

/* TOAST */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:99px;font-weight:700;font-size:14px;z-index:99;box-shadow:0 8px 32px #0009;white-space:nowrap;display:none}
</style>

</head>
<body>
<div id="wrap">
  <div class="hdr">
    <div class="hdr-row">
      <div class="logo">Auto<span>Budget</span><small>Gestion sans saisie</small></div>
      <div class="tot-box"><div class="tot-lbl">Total</div><div class="tot-val" id="tv">0,00 €</div></div>
    </div>
    <div class="pills" id="pills"></div>
  </div>

  <div class="tabbar" id="tabbar">
    <button class="tab on" data-t="scan"><span class="ti">📸</span>Scanner</button>
    <button class="tab" data-t="charts"><span class="ti">📊</span>Graphiques</button>
    <button class="tab" data-t="compare"><span class="ti">🔍</span>Comparateur</button>
  </div>

  <div id="ct"></div>
</div>

<div id="toast"></div>
<input type="file" id="fi" accept="image/*" style="display:none"/>

<script>
/* ─ State ─ */
var R = JSON.parse(localStorage.getItem("ab3")||"[]");
var TAB="scan", FLT="all", BUSY=false;

/* ─ Data ─ */
var CATS = {
  "alimentation":{e:"🛒",c:"#5eead4",l:"Alimentation"},
  "loisirs":     {e:"🎬",c:"#f9a8d4",l:"Loisirs"},
  "santé":       {e:"💊",c:"#93c5fd",l:"Santé"},
  "sante":       {e:"💊",c:"#93c5fd",l:"Santé"},
  "transport":   {e:"🚗",c:"#fcd34d",l:"Transport"},
  "maison":      {e:"🏠",c:"#c4b5fd",l:"Maison"},
  "autre":       {e:"📦",c:"#94a3b8",l:"Autre"}
};
function cat(k){return CATS[k]||CATS[(k||"").toLowerCase().replace("é","e")]||CATS.autre;}
function eur(n){return new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(+n||0);}
function gm(d){var x=new Date(d);return x.getFullYear()+"-"+("0"+(x.getMonth()+1)).slice(-2);}
function mlbl(s){var p=s.split("-");return new Date(+p[0],+p[1]-1).toLocaleDateString("fr-FR",{month:"short",year:"2-digit"});}
function save(){try{localStorage.setItem("ab3",JSON.stringify(R));}catch(e){}}
function filt(){return FLT==="all"?R:R.filter(function(r){return gm(r.date)===FLT;});}
function total(){return filt().reduce(function(s,r){return s+(+r.amount||0);},0);}
function allMonths(){var s={};R.forEach(function(r){s[gm(r.date)]=1;});return["all"].concat(Object.keys(s).sort().reverse());}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ─ Toast ─ */
function toast(m,type){
  var el=document.getElementById("toast");
  el.textContent=m; el.style.display="block";
  el.style.background=type==="err"?"#ef4444":"#5eead4";
  el.style.color=type==="err"?"#fff":"#022c22";
  setTimeout(function(){el.style.display="none";},3000);
}

/* ─ Header ─ */
function renderHdr(){
  document.getElementById("tv").textContent=eur(total());
  var p=document.getElementById("pills"); p.innerHTML="";
  allMonths().forEach(function(m){
    var b=document.createElement("button");
    b.className="pill"+(m===FLT?" on":"");
    b.textContent=m==="all"?"Tout":mlbl(m);
    b.onclick=function(){FLT=m;renderAll();};
    p.appendChild(b);
  });
}

/* ─ Tabs ─ */
function renderTabs(){
  document.querySelectorAll(".tab").forEach(function(t){
    t.classList.toggle("on",t.dataset.t===TAB);
  });
}

/* ─ SCAN ─ */
function buildCard(r){
  var m=cat(r.category);
  var d=new Date(r.date).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});
  var rows=(r.items||[]).map(function(i){
    return '<div class="irow"><span>'+esc(i.name)+'</span><span>'+eur(i.price)+'</span></div>';
  }).join("");
  return '<div class="card">'+
    '<div class="card-top">'+
      '<div class="card-left"><div class="card-store">'+esc(r.store)+'</div><div class="card-date">'+d+'</div></div>'+
      '<div class="card-right">'+
        '<div class="card-amt" style="color:'+m.c+'">'+eur(r.amount)+'</div>'+
        '<span class="chip" style="background:'+m.c+'22;color:'+m.c+';border-color:'+m.c+'44">'+m.e+' '+m.l+'</span>'+
      '</div>'+
    '</div>'+
    (rows?'<button class="tog" onclick="togItems(this,\'il'+r.id+'\')"><span class="arr">▶</span> '+(r.items.length)+' article'+(r.items.length>1?"s":"")+'</button><div class="ilist" id="il'+r.id+'">'+rows+'</div>':'')+
    '<button class="delbtn" onclick="delR('+r.id+')">🗑 Supprimer</button>'+
  '</div>';
}
function togItems(btn,id){
  var el=document.getElementById(id);
  var open=el.style.display==="block";
  el.style.display=open?"none":"block";
  btn.querySelector(".arr").style.transform=open?"":"rotate(90deg)";
}
function delR(id){R=R.filter(function(r){return r.id!==id;});save();renderAll();}

function renderScan(){
  var f=filt(); var html="";
  /* Dropzone */
  if(BUSY){
    html='<div class="dz"><div class="spin">⚙️</div><h2 style="color:#5eead4">Analyse en cours…</h2><p>L\'IA lit votre ticket</p></div>';
  } else {
    html='<div class="dz" id="dz"><span class="big">📸</span><h2>Importer un ticket</h2><p>Appuyer ou glisser · JPG PNG HEIC</p></div>';
  }
  /* List */
  if(f.length){
    html+='<div class="slbl">'+f.length+' ticket'+(f.length>1?"s":"")+'</div>';
    f.forEach(function(r){html+=buildCard(r);});
  } else if(!BUSY){
    html+='<div class="empty"><span class="big">🧾</span><h3>Aucun ticket</h3><p>Prenez une photo pour commencer</p></div>';
  }
  document.getElementById("ct").innerHTML=html;
  var dz=document.getElementById("dz");
  if(dz){
    dz.onclick=function(){document.getElementById("fi").click();};
    dz.ondragover=function(e){e.preventDefault();dz.classList.add("drag");};
    dz.ondragleave=function(){dz.classList.remove("drag");};
    dz.ondrop=function(e){e.preventDefault();dz.classList.remove("drag");doFile(e.dataTransfer.files[0]);};
  }
}

/* ─ CHARTS ─ */
function donut(items){
  var total=items.reduce(function(s,x){return s+x.v;},0); if(!total) return "";
  var r=70,cx=80,cy=80,a=-Math.PI/2; var paths="";
  items.forEach(function(s){
    var sweep=2*Math.PI*(s.v/total);
    if(sweep>=2*Math.PI) sweep-=0.001;
    var x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);
    var x2=cx+r*Math.cos(a+sweep),y2=cy+r*Math.sin(a+sweep);
    var ri=r*0.52,ix1=cx+ri*Math.cos(a),iy1=cy+ri*Math.sin(a);
    var ix2=cx+ri*Math.cos(a+sweep),iy2=cy+ri*Math.sin(a+sweep);
    var lg=sweep>Math.PI?1:0;
    paths+='<path d="M'+ix1+','+iy1+' A'+ri+','+ri+' 0 '+lg+',1 '+ix2+','+iy2+' L'+x2+','+y2+' A'+r+','+r+' 0 '+lg+',0 '+x1+','+y1+' Z" fill="'+s.c+'"/>';
    a+=sweep;
  });
  return '<svg width="160" height="160" viewBox="0 0 160 160" style="flex-shrink:0">'+paths+'</svg>';
}

function renderCharts(){
  var f=filt();
  if(!f.length){
    document.getElementById("ct").innerHTML='<div class="empty"><span class="big">📊</span><h3>Aucune donnée</h3><p>Ajoutez des tickets via Scanner</p></div>';
    return;
  }
  /* By cat */
  var bc={};f.forEach(function(r){bc[r.category]=(bc[r.category]||0)+(+r.amount||0);});
  var catE=Object.entries(bc).sort(function(a,b){return b[1]-a[1];});
  var slices=catE.map(function(e){return{v:e[1],c:cat(e[0]).c};});
  var legend=catE.map(function(e){var m=cat(e[0]);return '<div class="lgrow"><div class="lgdot" style="background:'+m.c+'"></div><div class="lgnm">'+m.l+'</div><div class="lgvl">'+eur(e[1])+'</div></div>';}).join("");
  /* By store */
  var bs={};f.forEach(function(r){bs[r.store]=(bs[r.store]||0)+(+r.amount||0);});
  var stE=Object.entries(bs).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  var maxS=stE[0]?stE[0][1]:1;
  var storeBars=stE.map(function(e){var pct=Math.round(e[1]/maxS*100);return '<div class="brow"><div class="blbl">'+esc(e[0])+'</div><div class="btrack"><div class="bfill" style="width:'+pct+'%;background:#5eead4"></div></div><div class="bval">'+eur(e[1])+'</div></div>';}).join("");
  /* By month */
  var bm={};f.forEach(function(r){var m=gm(r.date);bm[m]=(bm[m]||0)+(+r.amount||0);});
  var monthE=Object.entries(bm).sort();
  var maxM=monthE.reduce(function(mx,e){return Math.max(mx,e[1]);},1);
  var monthC=monthE.map(function(e){var pct=Math.round(e[1]/maxM*76);return '<div class="mcol"><div class="mval" style="color:#f9a8d4">'+eur(e[1])+'</div><div class="mbar" style="height:'+pct+'px;background:#f9a8d4"></div><div class="mlbl">'+mlbl(e[0])+'</div></div>';}).join("");

  document.getElementById("ct").innerHTML=
    '<div class="cbox"><h3>Répartition</h3><div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">'+donut(slices)+'<div>'+legend+'</div></div></div>'+
    (stE.length>1?'<div class="cbox"><h3>Par magasin</h3><div class="bars">'+storeBars+'</div></div>':'')+
    (monthE.length>1?'<div class="cbox"><h3>Évolution mensuelle</h3><div class="mchart">'+monthC+'</div></div>':'');
}

/* ─ COMPARE ─ */
function renderCompare(){
  var mp={};
  R.forEach(function(r){
    var mo=gm(r.date);
    (r.items||[]).forEach(function(it){
      var k=String(it.name||"").toLowerCase().trim();
      if(!mp[k]) mp[k]={name:it.name,bm:{}};
      if(!mp[k].bm[mo]) mp[k].bm[mo]=[];
      mp[k].bm[mo].push(+it.price||0);
    });
  });
  var comp=Object.values(mp).filter(function(d){return Object.keys(d.bm).length>=2;}).map(function(d){
    var ms=Object.keys(d.bm).sort();
    var data=ms.map(function(m){return{m:mlbl(m),p:+(d.bm[m].reduce(function(a,b){return a+b;},0)/d.bm[m].length).toFixed(2)};});
    var delta=((data[data.length-1].p-data[0].p)/data[0].p)*100;
    return{name:d.name,data:data,delta:delta};
  });
  if(!comp.length){
    document.getElementById("ct").innerHTML='<div class="empty"><span class="big">🔍</span><h3>Aucun produit récurrent</h3><p>Ajoutez des tickets sur plusieurs mois</p></div>';
    return;
  }
  document.getElementById("ct").innerHTML=comp.map(function(item){
    var up=item.delta>0,col=up?"#f87171":"#4ade80";
    var maxP=Math.max.apply(null,item.data.map(function(d){return d.p;}));
    var bars=item.data.map(function(d){var pct=Math.round(d.p/maxP*76);return '<div class="mcol"><div class="mval" style="color:'+col+'">'+eur(d.p)+'</div><div class="mbar" style="height:'+pct+'px;background:'+col+'"></div><div class="mlbl">'+esc(d.m)+'</div></div>';}).join("");
    return '<div class="cbox"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-weight:700;color:#f1f5f9">'+esc(item.name)+'</span><span class="cbdg" style="background:'+col+'22;color:'+col+';border-color:'+col+'44">'+(up?"▲":"▼")+' '+Math.abs(item.delta).toFixed(1)+'%</span></div><div class="mchart">'+bars+'</div></div>';
  }).join("");
}

/* ─ Master ─ */
function renderAll(){
  renderHdr(); renderTabs();
  if(TAB==="scan") renderScan();
  else if(TAB==="charts") renderCharts();
  else renderCompare();
}

/* ─ File + AI ─ */
function doFile(file){
  if(!file||BUSY) return;
  BUSY=true; renderAll();
  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(",")[1];
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:800,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
          {type:"text",text:"Analyse ce ticket de caisse. Réponds UNIQUEMENT avec un objet JSON valide, sans texte autour, sans markdown:\n{\"store\":\"Nom\",\"amount\":0.00,\"category\":\"alimentation|loisirs|santé|transport|maison|autre\",\"items\":[{\"name\":\"produit\",\"price\":0.00}],\"date\":\"YYYY-MM-DD\"}\nSi illisible, génère un ticket français réaliste."}
        ]}]
      })
    })
    .then(function(r){return r.json();})
    .then(function(d){
      var txt=d.content.map(function(b){return b.text||"";}).join("");
      var clean=txt.replace(/```[\w]*/g,"").replace(/```/g,"").trim();
      var obj=JSON.parse(clean);
      obj.id=Date.now();
      obj.date=obj.date||new Date().toISOString().slice(0,10);
      R.unshift(obj); save();
      toast("✅ "+obj.store+" · "+eur(obj.amount));
    })
    .catch(function(err){console.error(err);toast("❌ Erreur, réessayez","err");})
    .finally(function(){BUSY=false;renderAll();});
  };
  reader.readAsDataURL(file);
}

/* ─ Events ─ */
document.getElementById("fi").onchange=function(e){doFile(e.target.files[0]);e.target.value="";};
document.querySelectorAll(".tab").forEach(function(t){t.onclick=function(){TAB=t.dataset.t;renderAll();};});

/* ─ Start ─ */
renderAll();
</script>

</body>
</html>
